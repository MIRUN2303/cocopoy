<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Orders | Cocopoy - Track Your Snack Shipments</title>
<meta name="description" content="View your order history and track your latest snack shipments from Cocopoy Pollachi."/>
<meta name="robots" content="noindex, nofollow"/>

<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{primary:"#0B113D",secondary:"#F47C20",accent:"#F9FAFB","background-dark":"#0B113D","surface-dark":"#1A1A3D","text-muted-dark":"#A0A4B8","border-dark":"#2C2F54"},fontFamily:{display:["Work Sans","sans-serif"]}}}}</script>
<style>body{font-family:'Work Sans',sans-serif} @media(max-width:767px){main{padding:1.5rem 1rem 2rem!important}main h1{font-size:1.75rem}article{border-radius:0.85rem;padding:1rem!important}}</style>
</head>
<body class="min-h-screen bg-background-dark text-white">

<header class="sticky top-0 z-[100] bg-surface-dark border-b border-border-dark shadow-sm">
  <div class="container mx-auto flex items-center justify-between px-4 py-4 lg:px-8">
    <a href="index.html"><img src="image/logo/fltlogo.png" alt="Cocopoy" class="h-10 w-auto sm:h-12 lg:h-14"/></a>
    <nav class="hidden md:flex items-center gap-8">
      <a class="text-sm text-text-muted-dark hover:text-secondary transition-colors" href="index.html">Dashboard</a>
      <a class="text-sm text-text-muted-dark hover:text-secondary transition-colors" href="cococart.html">Cart</a>
      <a class="text-sm text-secondary font-bold" href="cocoorders.html">Orders</a>
      <a class="text-sm text-text-muted-dark hover:text-secondary transition-colors" href="cococontact.html">Contact</a>
    </nav>
    <button id="mobileMenuBtn" class="md:hidden text-2xl text-secondary">☰</button>
  </div>
  
  <nav id="mobileMenu" class="hidden md:hidden absolute top-full left-0 w-full bg-surface-dark flex flex-col border-t border-border-dark shadow-2xl">
    <a class="block px-6 py-3 text-sm text-text-muted-dark" href="index.html">Dashboard</a>
    <a class="block px-6 py-3 text-sm text-text-muted-dark" href="cococart.html">Cart</a>
    <a class="block px-6 py-3 text-sm text-secondary font-bold" href="cocoorders.html">Orders</a>
    <a class="block px-6 py-3 text-sm text-text-muted-dark" href="cococontact.html">Contact</a>
  </nav>
</header>

<main class="container mx-auto px-4 py-8 lg:px-8">
  <div class="mb-8 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
    <div>
      <p class="text-sm font-semibold uppercase tracking-wider text-secondary">My Orders</p>
      <h1 class="mt-2 text-3xl font-bold">Order History</h1>
    </div>
    <a href="index.html#products" class="inline-flex w-fit items-center justify-center rounded-lg bg-secondary px-5 py-3 text-sm font-bold text-black hover:bg-white transition-colors">Shop More</a>
  </div>

  <div id="ordersLoading" class="text-center py-12 text-text-muted-dark">Loading your orders...</div>
  <div id="ordersContainer" class="grid gap-4 hidden"></div>
</main>

<!-- Refund Popup -->
<div id="refundPopup" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
  <div class="bg-surface-dark rounded-xl max-w-sm w-full p-6 border border-border-dark">
    <h3 class="font-bold text-lg text-white mb-2">Cancel & Request Refund</h3>
    <p class="text-sm text-text-muted-dark mb-4">Please provide your UPI details so we can process your refund quickly.</p>
    
    <label class="block text-sm text-text-muted-dark mb-1">Reason for cancellation (optional)</label>
    <input type="text" id="refundReason" class="w-full bg-background-dark border border-border-dark rounded-lg p-2 mb-3 text-white">

    <label class="block text-sm text-text-muted-dark mb-1">Your exact UPI ID *</label>
    <input type="text" id="refundUpi" class="w-full bg-background-dark border border-border-dark rounded-lg p-2 mb-3 text-white" placeholder="e.g. 9876543210@ybl">

    <label class="block text-sm text-text-muted-dark mb-1">Name registered to this UPI *</label>
    <input type="text" id="refundName" class="w-full bg-background-dark border border-border-dark rounded-lg p-2 mb-5 text-white" placeholder="e.g. John Doe">

    <button id="submitRefundBtn" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2 rounded-lg mb-2">Submit Cancellation</button>
    <button id="closeRefundBtn" class="w-full bg-transparent border border-border-dark text-text-muted-dark font-bold py-2 rounded-lg hover:bg-border-dark">Go Back</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js?v=1.5"></script>
<script src="js/auth.js?v=1.5"></script>
<script src="js/cart.js?v=1.5"></script>
<script src="js/orders.js?v=1.5"></script>
<script src="js/utils.js?v=1.5"></script>

<script>
setupMobileMenu();

// Renders all orders into the container
function renderOrders(orders, container) {
  container.innerHTML = '';
  if (!orders.length) {
    container.innerHTML = '<div class="rounded-lg border border-border-dark bg-surface-dark p-5 text-text-muted-dark">No orders yet. <a href="index.html#products" class="text-secondary underline">Start shopping!</a></div>';
    return;
  }

  orders.forEach(order => {
    // 1. Admin's explicit cancel_status wins
    // 2. Fallback to status column
    // 3. Last fallback to cancel_flag (legacy/RLS fallback)
    let currentStatus = order.delivery_info?.cancel_status || order.status;

    // If the admin denied the cancellation, the main order status resumes its normal flow!
    if (order.delivery_info?.cancel_status === 'cancel_denied') {
      currentStatus = order.status;
    }
    
    // If the admin uploaded a proof, force the main badge to 'Refund Processed'
    if (order.delivery_info?.refund_proof) {
      currentStatus = 'refund_processed';
    }

    // If a cancellation request was ever made, hide the cancel button forever
    const isCancelRequested = !!order.delivery_info?.refund || !!order.delivery_info?.cancel_flag;

    if (!order.delivery_info?.cancel_status && order.delivery_info?.cancel_flag === true && order.status !== 'cancelled') {
      currentStatus = 'cancel_requested';
    }

    let cfg = getStatusConfig(currentStatus);

    const items = order.order_items || [];
    const itemCount = items.reduce((s, i) => s + i.quantity, 0);
    const firstItem = items[0]?.product_name || 'Order';
    const summary = `${firstItem}${itemCount > 1 ? ` + ${itemCount - 1} more` : ''}`;

    const card = document.createElement('article');
    card.className = 'rounded-lg border border-border-dark bg-surface-dark p-5';
    card.dataset.orderId = order.id;
    card.innerHTML = `
      <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
        <div>
          <p class="text-sm text-text-muted-dark font-mono">${order.id}</p>
          <h3 class="mt-1 text-lg font-bold">${summary}</h3>
          <p class="mt-2 text-[10px] font-bold text-secondary uppercase tracking-widest">Order Placed On:</p>
          <p class="text-xs text-text-muted-dark">${formatDate(order.created_at)}</p>
          <div class="mt-2 flex items-center gap-2">
            <span class="inline-block px-3 py-1 rounded-full text-xs font-bold ${cfg.color} text-white">${cfg.icon} ${cfg.label}</span>
          </div>
          ${(() => {
            // Determine what to show in the BIG box
            const subStatus = order.delivery_info?.cancel_status || order.status;
            const isCancelFlowActive = !!order.delivery_info?.refund && subStatus !== 'cancel_denied' && subStatus !== 'cancelled' && subStatus !== 'refund_processed';
            
            // Final terminal states don't get a big box
            if (order.status === 'delivered' || subStatus === 'cancelled' || subStatus === 'refund_processed') return '';

            // If cancellation is active, show THAT as big
            const displayStatus = isCancelFlowActive ? subStatus : order.status;
            const displayCfg = getStatusConfig(displayStatus);

            return `
              <div class="mt-4 bg-surface border border-secondary/30 rounded-xl p-6 text-center shadow-2xl relative overflow-hidden">
                <div class="absolute inset-0 bg-secondary/5 blur-xl"></div>
                <div class="relative z-10">
                  <p class="text-[9px] text-text-muted-dark uppercase tracking-widest mb-3 font-black">
                    ${isCancelFlowActive ? 'Cancellation Request Progress' : 'Current Order Status'}
                  </p>
                  <div class="inline-flex items-center justify-center gap-3 bg-background-dark/80 backdrop-blur px-6 py-4 rounded-2xl border-2 ${isCancelFlowActive ? 'border-orange-500/40' : 'border-secondary/40'} shadow-lg">
                    <span class="text-3xl drop-shadow-md">${displayCfg.icon}</span>
                    <span class="text-lg sm:text-xl font-black text-white uppercase tracking-wider">${displayCfg.label}</span>
                  </div>
                </div>
              </div>
            `;
          })()}

          ${order.delivery_info?.refund ? `
            <div class="mt-4 space-y-4">
              ${order.delivery_info?.cancel_status === 'cancel_denied' ? `
                <div class="bg-red-950/40 border border-red-500/40 rounded-xl p-5 text-center shadow-lg">
                  <span class="text-2xl mb-2 block">❌</span>
                  <p class="text-sm md:text-base text-red-400 font-black tracking-wide uppercase">Sorry, your cancellation request has been denied</p>
                  <p class="text-[10px] text-text-muted-dark mt-2">The order will now proceed as per the status shown above.</p>
                </div>
              ` : `
                <div class="bg-red-500/10 border border-red-500/20 rounded-lg p-4">
                  ${order.delivery_info.cancel_status === 'refund_processing' ? `
                    <p class="text-xs text-green-400 font-bold mb-2 text-center uppercase tracking-widest animate-pulse">Accepted - Processing Refund</p>
                    ${order.delivery_info.refund_proof ? `
                      <button onclick="showRefundProof('${order.delivery_info.refund_proof}')" class="w-full text-[10px] font-bold text-green-400 border border-green-500/30 rounded py-2 hover:bg-green-500/10 transition uppercase tracking-widest">
                        📄 View Refund Screenshot
                      </button>
                    ` : '<p class="text-[10px] text-text-muted-dark mt-1 text-center italic">Refund proof will appear here shortly.</p>'}
                  ` : `
                    <p class="text-xs text-yellow-400 font-bold text-center uppercase tracking-widest">Request Received</p>
                    <p class="text-[10px] text-text-muted-dark mt-1 text-center">Your request for refund to <span class="font-mono text-white">${order.delivery_info.refund.upi}</span> is being reviewed.</p>
                  `}
                </div>
              `}
            </div>
          ` : ''}
          ${order.delivery_info?.message ? `<p class="mt-1 text-sm text-text-muted-dark">${order.delivery_info.message}</p>` : ''}
        </div>
        <div class="flex flex-col items-start gap-3 sm:items-end">
          <p class="text-xl font-bold text-secondary">₹${order.total}</p>
          ${(() => {
            const hoursSince = (new Date() - new Date(order.created_at)) / (1000 * 60 * 60);
            
            // Priority 1: Cancellation already requested
            if (isCancelRequested) return '';

            // Priority 2: Admin Cancelled (No user request)
            if (order.status === 'cancelled' && !order.delivery_info?.refund) {
               return `<p class="mt-2 text-[9px] text-red-500 font-black uppercase tracking-widest">🚫 Order Cancelled by Admin</p>`;
            }

            // Priority 3: Shipped status (cannot cancel regardless of time)
            if (['confirmed', 'shipped', 'delivered'].includes(order.status)) {
               return `<p class="mt-2 text-[9px] text-red-400 font-black uppercase tracking-widest">🚫 Cannot cancel: Order Shipped</p>`;
            }

            // Priority 3: 7-hour limit
            if (hoursSince > 7) {
               return `<p class="mt-2 text-[9px] text-gray-500 font-black uppercase tracking-widest">🚫 Cancellation window closed (7h limit)</p>`;
            }

            // Priority 4: Available to cancel
            return `
              <div class="mt-2 flex flex-col items-start sm:items-end gap-1">
                <p class="text-[9px] text-text-muted-dark font-bold">Cancellation available before 7 hours OR before shipping</p>
                <button class="text-xs text-red-500 font-bold hover:underline" onclick="handleCancelOrder('${order.id}')">Cancel Order</button>
              </div>
            `;
          })()}
        </div>
      </div>
      <div class="mt-4 border-t border-border-dark pt-3">
        <p class="text-xs text-text-muted-dark mb-2">Items:</p>
        <div class="flex flex-wrap gap-2">
          ${items.map(i => `<span class="text-xs bg-background-dark border border-border-dark rounded-full px-3 py-1">${i.product_name} ×${i.quantity}</span>`).join('')}
        </div>
      </div>
`;
    container.appendChild(card);
  });
}

(async () => {
  const user = await getCurrentUser();
  const loading = document.getElementById('ordersLoading');
  const container = document.getElementById('ordersContainer');

  if (!user) {
    loading.innerHTML = 'Please <a href="cocologin.html" class="text-secondary font-bold underline">login</a> to view orders.';
    return;
  }

  const orders = await getMyOrders();
  loading.classList.add('hidden');
  container.classList.remove('hidden');
  renderOrders(orders, container);

  // ── REALTIME: instant update when Supabase Realtime is enabled ──
  db.channel('orders-live')
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'orders',
      filter: `user_id=eq.${user.id}`
    }, async () => {
      const fresh = await getMyOrders();
      renderOrders(fresh, container);
    })
    .subscribe();

  // ── POLLING FALLBACK: refresh every 15 seconds regardless ──
  // This ensures updates show even if Supabase Realtime is not enabled on this table
  setInterval(async () => {
    const fresh = await getMyOrders();
    renderOrders(fresh, container);
  }, 15000);
})();

window.showRefundProof = (src) => {
  const overlay = document.createElement('div');
  overlay.className = 'fixed inset-0 z-[999] flex items-center justify-center bg-black/90 p-4';
  overlay.innerHTML = `
    <div class="relative max-w-sm w-full bg-surface-dark rounded-2xl border border-border-dark overflow-hidden">
      <div class="flex items-center justify-between p-3 border-b border-border-dark">
        <span class="text-xs font-bold text-green-400">📄 Refund Proof</span>
        <button onclick="this.closest('.fixed').remove()" class="text-text-muted-dark hover:text-white text-lg leading-none">✕</button>
      </div>
      <img src="${src}" class="w-full h-auto max-h-[70vh] object-contain" />
    </div>
  `;
  document.body.appendChild(overlay);
};

let currentCancelOrderId = null;
window.handleCancelOrder = (orderId) => {
  currentCancelOrderId = orderId;
  document.getElementById('refundPopup').classList.remove('hidden');
};

document.getElementById('closeRefundBtn').addEventListener('click', () => {
  document.getElementById('refundPopup').classList.add('hidden');
  document.getElementById('refundReason').value = '';
  document.getElementById('refundUpi').value = '';
  document.getElementById('refundName').value = '';
  currentCancelOrderId = null;
});

document.getElementById('submitRefundBtn').addEventListener('click', async () => {
  const reason = document.getElementById('refundReason').value.trim();
  const upi = document.getElementById('refundUpi').value.trim();
  const name = document.getElementById('refundName').value.trim();
  const btn = document.getElementById('submitRefundBtn');

  if (!upi || !name) {
    alert('Please provide your exact UPI ID and Name so we can refund you.');
    return;
  }

  if (!currentCancelOrderId) {
    alert('No order selected. Please try again.');
    return;
  }

  try {
    btn.textContent = 'Processing...';
    btn.disabled = true;
    await cancelOrderWithRefund(currentCancelOrderId, { reason, upi, name });
    document.getElementById('refundPopup').classList.add('hidden');
    alert('✅ Cancellation request submitted! The admin will process your refund soon.');
    window.location.reload();
  } catch(err) {
    console.error('Cancel order error:', err);
    alert('❌ ' + (err.message || 'Something went wrong. Please try again.'));
    btn.textContent = 'Submit Cancellation';
    btn.disabled = false;
  }
});
</script>
</body></html>
