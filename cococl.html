<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cocopoy - Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0B113D;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
.container{max-width:400px}
h1{font-size:2rem;margin-bottom:1rem;color:#F47C20}
p{font-size:1.1rem;opacity:0.8;margin-bottom:2rem;line-height:1.6}
.icon{font-size:4rem;margin-bottom:1.5rem}
button{background:#F47C20;color:#fff;border:none;padding:12px 32px;border-radius:999px;font-size:1rem;font-weight:700;cursor:pointer;transition:transform 0.2s}
button:hover{transform:scale(1.05)}
</style>
</head>
<body>
<div class="container">
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</div>
<script>
window.addEventListener('online', () => { window.location.href = 'index.html'; });
</script>
</body></html>
