<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guardian Payment Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0B113D; --accent: #F47C20; --surface: #FFFFFF; --bg: #F3F4F6; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); padding: 15px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .terminal { background: var(--surface); width: 100%; max-width: 400px; border-radius: 32px; box-shadow: 0 25px 50px rgba(0,0,0,0.1); padding: 24px; position: relative; overflow: hidden; margin-top: 10px; }
        .terminal::before { content:''; position:absolute; top:0; left:0; right:0; height:8px; background: linear-gradient(90deg, var(--accent), var(--primary)); }
        .amount-section { text-align: center; margin-bottom: 24px; }
        .amount-label { font-size: 0.75rem; font-weight: 800; color: #9CA3AF; text-transform: uppercase; margin-bottom: 4px; }
        .amount { font-size: 3rem; font-weight: 900; letter-spacing: -2px; }
        .section { padding: 20px; border-radius: 24px; border: 2px solid #F3F4F6; }
        .pay-btn { width:100%; padding:20px; background:var(--primary); color:white; border:none; border-radius:20px; font-weight:900; font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:all 0.2s; }
        .pay-btn:active { transform:scale(0.97); }
        .pay-btn:disabled { opacity:0.6; cursor:not-allowed; }
        .status-box { text-align:center; padding:30px; }
        .status-box .icon { font-size:3rem; margin-bottom:15px; }
        .status-box .msg { font-weight:800; font-size:1.1rem; color:var(--primary); }
        #success-modal { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); z-index:99999; display:none; align-items:center; justify-content:center; padding:20px; }
        .modal-content { background:white; width:100%; max-width:360px; padding:40px 30px; border-radius:40px; text-align:center; box-shadow:0 30px 60px rgba(0,0,0,0.3); animation:modalIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275); }
        @keyframes modalIn { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
        .success-icon { width:80px; height:80px; background:#ECFDF5; color:#10B981; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:40px; margin:0 auto 24px; }
        .modal-title { font-size:2rem; font-weight:900; color:var(--primary); margin-bottom:8px; }
        .modal-desc { font-size:1rem; color:#6B7280; font-weight:600; margin-bottom:30px; line-height:1.5; }
        .dashboard-btn { background:var(--accent); color:white; border:none; width:100%; padding:18px; border-radius:20px; font-weight:900; font-size:1.1rem; cursor:pointer; box-shadow:0 10px 20px rgba(244,124,32,0.3); }
    </style>
</head>
<body>

    <div class="terminal">
        <div class="amount-section">
            <p class="amount-label">Total Payable</p>
            <div class="amount">₹<span id="display-amount">0.00</span></div>
        </div>

        <div class="section" style="margin-bottom:12px;">
            <button id="btn-pay-now" class="pay-btn">
                💳 PAY ₹<span id="pay-amount-display">0</span>
            </button>
            <div id="payment-loading" style="display:none; text-align:center; padding:20px;">
                <div style="font-size:2rem; margin-bottom:10px;">⏳</div>
                <p style="font-weight:800; color:var(--primary);">Redirecting to secure payment page...</p>
            </div>
        </div>

        <div id="section-verify" class="section" style="display:none;">
            <div class="status-box">
                <div class="icon" id="verify-icon">⏳</div>
                <p class="msg" id="verify-msg">Verifying your payment...</p>
            </div>
        </div>

        <a href="cococart.html" style="display:block; text-align:center; margin-top:16px; color:#9CA3AF; font-size:0.8rem; font-weight:700; text-decoration:none;">✕ CANCEL & BACK</a>
    </div>

    <div id="success-modal">
        <div class="modal-content">
            <div class="success-icon">✅</div>
            <h2 class="modal-title">Order Placed!</h2>
            <p class="modal-desc">Your order is confirmed. We'll process it shortly.</p>
            <button onclick="window.location.href='cocoorders.html'" class="dashboard-btn">VIEW ORDER STATUS</button>
        </div>
    </div>

    <!-- SDKs & Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/utils.js"></script>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const rawAmount = params.get('am') || '0.00';
            const amount = parseFloat(rawAmount.replace(/[₹,\s]/g, '')).toFixed(2);
            let pending = {};
            try {
                const stored = localStorage.getItem('pending_order_data');
                if (stored && stored !== 'undefined') pending = JSON.parse(stored);
            } catch (e) {}

            const sPay = document.querySelector('.section');
            const sVerify = document.getElementById('section-verify');
            const btnPayNow = document.getElementById('btn-pay-now');
            const payLoading = document.getElementById('payment-loading');
            const verifyIcon = document.getElementById('verify-icon');
            const verifyMsg = document.getElementById('verify-msg');

            document.getElementById('display-amount').textContent = amount;
            document.getElementById('pay-amount-display').textContent = amount;

            const callbackCode = params.get('code');
            const callbackTxnId = params.get('transactionId');

            if (callbackCode && callbackTxnId) {
                sPay.style.display = 'none';
                sVerify.style.display = 'block';
                handlePaymentCallback(callbackCode, callbackTxnId);
            }

            btnPayNow.onclick = async function() {
                this.style.display = 'none';
                payLoading.style.display = 'block';
                try {
                    const merchantTransactionId = `COCO_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
                    const redirectUrl = window.location.href.split('?')[0] + '?am=' + amount;

                    const edgeFn = typeof PHONEPE_EDGE_FN !== 'undefined'
                        ? PHONEPE_EDGE_FN
                        : SUPABASE_URL + '/functions/v1/phonepe-pay';

                    const res = await fetch(edgeFn + '/initiate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ amount: parseFloat(amount), merchantTransactionId, redirectUrl })
                    });
                    const data = await res.json();
                    if (data.success && data.data?.instrumentResponse?.redirectInfo?.url) {
                        localStorage.setItem('pp_txn_id', merchantTransactionId);
                        window.location.href = data.data.instrumentResponse.redirectInfo.url;
                    } else {
                        throw new Error(data.message || 'Failed to initiate payment');
                    }
                } catch (err) {
                    alert('Payment failed: ' + err.message);
                    this.style.display = 'flex';
                    payLoading.style.display = 'none';
                }
            };

            async function handlePaymentCallback(code, txnId) {
                if (code !== 'PAYMENT_SUCCESS') {
                    verifyIcon.textContent = '❌';
                    verifyMsg.textContent = 'Payment was not completed. Try again.';
                    verifyMsg.style.color = '#DC2626';
                    setTimeout(() => window.location.href = 'cococart.html', 3000);
                    return;
                }

                verifyMsg.textContent = 'Payment confirmed! Placing your order...';
                try {
                    const edgeFn = typeof PHONEPE_EDGE_FN !== 'undefined'
                        ? PHONEPE_EDGE_FN
                        : SUPABASE_URL + '/functions/v1/phonepe-pay';

                    const res = await fetch(edgeFn + '/status', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ merchantTransactionId: txnId })
                    });
                    const statusData = await res.json();

                    if (!statusData.success || statusData.code !== 'PAYMENT_SUCCESS') {
                        throw new Error('Payment verification failed');
                    }

                    let p = {};
                    try {
                        const stored = localStorage.getItem('pending_order_data');
                        if (stored && stored !== 'undefined') p = JSON.parse(stored);
                    } catch(e) {}
                    if (!p.deliveryAddress) throw new Error('Missing order data. Please return to cart.');

                    const ppRef = statusData.data?.paymentInstrument?.utr || statusData.data?.transactionId || '';
                    const info = p.latestDeliveryInfo || {};
                    info.payment_details = {
                        payment_status: 'paid',
                        phonepe_txn_id: txnId,
                        phonepe_ref_id: ppRef,
                        amount: amount
                    };

                    await placeOrder(p.deliveryAddress, info, 'phonepe_pg');
                    localStorage.removeItem('pending_order_data');
                    localStorage.removeItem('pay_done');
                    localStorage.removeItem('pp_txn_id');

                    verifyIcon.textContent = '✅';
                    verifyMsg.textContent = 'Order placed successfully!';
                    verifyMsg.style.color = '#10B981';
                    setTimeout(() => document.getElementById('success-modal').style.display = 'flex', 800);
                } catch (err) {
                    verifyIcon.textContent = '❌';
                    verifyMsg.textContent = err.message;
                    verifyMsg.style.color = '#DC2626';
                }
            }
        })();
    </script>
</body>
</html>
